name: Sabah panelini güncelle

on:
  schedule:
    # Her hafta içi 07:00 ve 12:00 TRT (=04:00 ve 09:00 UTC)
    - cron: "0 4 * * 1-5"
    - cron: "0 9 * * 1-5"
  workflow_dispatch: {}   # elle çalıştırmak istersen "Run workflow" butonu

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bağımlılıkları kur
        run: pip install -r requirements.txt

      - name: Paneli oluştur
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python build_panel.py

      - name: Değişiklikleri commit'le
        run: |
          git config user.name "sabah-paneli-bot"
          git config user.email "actions@users.noreply.github.com"
          git add index.html data.json
          git diff --quiet --cached || git commit -m "Sabah paneli güncellendi"
          git push
